<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 진짜 성격은? | 프리미엄 MBTI 테스트</title>
  <meta name="description" content="8개의 간단하고 정확한 질문을 통해 나의 진짜 MBTI 성격 유형을 알아보세요.">
  
  <!-- SEO Open Graph Tags -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="나의 진짜 성격은? | MBTI 성격유형 테스트">
  <meta property="og:description" content="단 8개의 질문으로 찾는 나의 진정한 성격 유형!">
  <meta property="og:image" content="">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Dynamic Background Glowing Elements -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <!-- Main Container -->
  <div class="container">
    <!-- Start Screen Card -->
    <main class="card" id="card-start">
      <!-- Icon/Badge Decoration -->
      <div class="badge-container">
        <span class="badge">MBTI TEST</span>
      </div>

      <!-- Main Title -->
      <h1 class="main-title">나의 진짜 성격은 ?</h1>

      <!-- Description -->
      <p class="description">
        8개의 간단한 질문으로 알아보는<br>
        나의 MBTI 유형
      </p>

      <!-- CTA Button -->
      <div class="button-wrapper">
        <button id="btn-start" class="btn btn-primary">
          <span>테스트 시작하기</span>
          <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </main>

    <!-- Question Screen Card -->
    <main class="card" id="card-question" style="display: none;">
      <!-- Progress Indicator -->
      <div class="progress-container">
        <div class="progress-header">
          <span id="question-number" class="question-number">Q1</span>
          <span id="progress-text" class="progress-text">1 / 8</span>
        </div>
        <div class="progress-bar-track">
          <div id="progress-bar" class="progress-bar" style="width: 12.5%;"></div>
        </div>
      </div>

      <!-- Question Text -->
      <h2 id="question-text" class="question-title">주말에 약속이 없다면?</h2>

      <!-- Choices -->
      <div class="choices-container">
        <button id="btn-choice-1" class="btn btn-choice" data-choice="0">집에 있는다</button>
        <button id="btn-choice-2" class="btn btn-choice" data-choice="1">밖으로 나가서 사람들을 만난다</button>
      </div>
    </main>

    <!-- Result Screen Card -->
    <main class="card" id="card-result" style="display: none;">
      <!-- Loading Analyzer State -->
      <div id="result-loading" class="result-loading">
        <div class="spinner-container">
          <div class="spinner"></div>
          <div class="spinner-glow"></div>
        </div>
        <p class="loading-text">나의 진짜 성격 분석 중...</p>
      </div>

      <!-- Actual Result Details -->
      <div id="result-content" class="result-content" style="display: none;">
        <div class="badge-container">
          <span class="badge">YOUR PERSONALITY TYPE</span>
        </div>
        
        <!-- Character Image -->
        <div class="result-char-container">
          <img id="result-char-img" class="result-char-img" src="" alt="MBTI 캐릭터">
        </div>
        
        <!-- Generated MBTI Type -->
        <h1 id="result-mbti" class="result-mbti-title">INFP</h1>
        <!-- MBTI Name Nickname -->
        <h2 id="result-name" class="result-mbti-name">열정적인 중재자</h2>
        
        <div class="divider"></div>
        
        <!-- Description -->
        <p id="result-description" class="result-description">
          주변 사람들에게 따뜻하고 친절하며, 가치관에 따라 진실하게 행동하는 것을 중요하게 생각합니다.
        </p>

        <!-- CTA Buttons -->
        <div class="button-wrapper">
          <button id="btn-restart" class="btn btn-primary">
            <span>다시 테스트하기</span>
            <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 4V10H10M20 20V14H14M20 6C18.4238 4.41775 16.3262 3.44189 14.0768 3.24588C11.8275 3.04987 9.58891 3.64771 7.75948 4.93339C5.93005 6.21908 4.636 8.10265 4.10375 10.2524C3.57149 12.4022 3.8398 14.6644 4.86102 16.6436C5.88224 18.6228 7.5843 20.1804 9.66448 21.0402C11.7447 21.8999 14.0537 21.9996 16.1912 21.3218C18.3288 20.644 20.1457 19.2366 21.3243 17.3456C22.5029 15.4547 22.9599 13.208 22.615 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Script -->
  <script src="app.js"></script>
</body>
</html>
